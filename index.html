<!DOCTYPE html>
<html lang="Zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款試算網站</title>
</head>
<body>
    <h1>貸款試算APP. V0.1</h1>
<hr>
    <form id="loanForm" action="">
    <label for="amount">貸款金額</label>
    <input type="number" id="amount" name="amount"
    value="100" step="10" min="10" required
    >萬
    <br>
    <label for="amount">貸款利率</label>
    <input type="number" id="rate" name="rate"
     value="1.85" step="0.1" min="1" required>%
    <!-- 新增手續費用欄位 habdingFree -->
    <br>
        <label for="amount">貸款手續費</label>
        <input type="number" id="habdingFree" name="habdingFree"
        placeholder="請輸入相關手續費" value="3000" step="1000" max="9000" required>元
        <br>
        <label for="loanYears">貸款年限</label>&nbsp;&nbsp;&nbsp;&nbsp;
        <select name="loanYears" id="loanYears">
                <option value="3">3</option>
                <option value="5">5</option>
                <option value="7">7</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40">40</option>
        </select> 年
        <label for="repayment">還款方式</label>
        <input type="radio" id="repayment1" name="repayment" value="repaymentMathod1" checked>本息平均攤還
        <input type="radio" id="repayment2" name="repayment" value="repaymentMathod2">本金平均攤還
        <br>
        <button type="submit" id="claBtn">計算</button>
    </form>
</body>
</html>
